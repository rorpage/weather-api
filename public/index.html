<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rorpage Weather API</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
      border-top: 4px solid #3DB3F4;
      border-bottom: 4px solid #3DB3F4;
    }

    /* ── COCKPIT ────────────────────────────────────── */
    .cockpit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 560px;
    }

    .cockpit-header {
      text-align: center;
    }

    .cockpit-header h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2rem;
      font-weight: 400;
      color: #3DB3F4;
      letter-spacing: 0.3em;
    }

    .cockpit-header .obs-time {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.12em;
      margin-top: 0.25rem;
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .search-input {
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 0.375rem 0.75rem;
      width: 5.75rem;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: #3DB3F4;
    }

    .btn-update {
      background: #3DB3F4;
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-family: 'Figtree', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.375rem 0.875rem;
      text-transform: uppercase;
      transition: background 0.15s;
    }

    .btn-update:hover {
      background: #60c6ff;
    }

    .status-msg {
      font-size: 0.875rem;
      color: #555;
      text-align: center;
      padding: 0.5rem;
    }

    .error-msg {
      font-size: 0.875rem;
      color: #ef4444;
      text-align: center;
      padding: 0.5rem;
    }

    /* ── INSTRUMENT PANEL ───────────────────────────── */
    .instrument-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
    }

    .gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gauge-wrap svg {
      width: 100%;
      max-width: 240px;
      height: auto;
    }

    /* ── INFO STRIP ─────────────────────────────────── */
    .info-strip {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
      width: 100%;
    }

    .info-card {
      background: #0d0d0d;
      border: 1px solid #1f1f1f;
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
    }

    .info-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.45;
    }

    /* ── RAW METAR ──────────────────────────────────── */
    .raw-metar {
      width: 100%;
      background: #080808;
      border: 1px solid #181818;
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
    }

    .raw-metar .raw-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .raw-metar .raw-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: #555;
      word-break: break-all;
      line-height: 1.5;
    }

    /* ── GAUGE LABEL (outside the circle) ──────────── */
    .gauge-label {
      text-align: center;
      font-family: 'Figtree', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      color: #777;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 400px) {
      .instrument-panel {
        gap: 0.625rem;
      }
    }
  </style>
</head>
<body>

  <!-- ── COCKPIT ────────────────────────────────────── -->
  <div id="cockpit" class="cockpit">
    <div class="cockpit-header">
      <h1 id="cockpit-id">----</h1>
      <div class="obs-time" id="cockpit-time">--:-- L</div>
    </div>

    <div class="search-bar">
      <input id="airport-input" class="search-input" type="text" maxlength="4" value="KUMP">
      <button class="btn-update" onclick="fetchMetar()">Update</button>
    </div>

    <div id="cockpit-loading" class="status-msg">Loading…</div>
    <div id="cockpit-error" class="error-msg hidden"></div>

    <div id="instruments" class="instrument-panel hidden">
      <div class="gauge-wrap">
        <svg id="gauge-fc" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Flight Category</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-temp" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Temperature</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-wind" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Wind</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-alt" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Altimeter</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-vis" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Visibility</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-dew" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Dewpoint</div>
      </div>
    </div>

    <div id="info-strip" class="info-strip hidden">
      <div class="info-card">
        <div class="info-label">Sky Conditions</div>
        <div class="info-value" id="sky-text">—</div>
      </div>
    </div>

    <div id="raw-metar-box" class="raw-metar hidden">
      <div class="raw-label">Raw METAR</div>
      <div class="raw-text" id="raw-metar-text">—</div>
    </div>
  </div>

  <script src="/cockpit.js"></script>
</body>
</html>
