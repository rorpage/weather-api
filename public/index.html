<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rorpage Weather API</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
      border-top: 4px solid #3DB3F4;
      border-bottom: 4px solid #3DB3F4;
    }

    /* ── COCKPIT ────────────────────────────────────── */
    .cockpit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 560px;
    }

    .cockpit-header {
      text-align: center;
    }

    .cockpit-header h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2rem;
      font-weight: 400;
      color: #3DB3F4;
      letter-spacing: 0.3em;
    }

    .cockpit-header .obs-time {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.12em;
      margin-top: 0.25rem;
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .search-input {
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 0.375rem 0.75rem;
      width: 5.75rem;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: #3DB3F4;
    }

    .btn-update {
      background: #3DB3F4;
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-family: 'Figtree', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.375rem 0.875rem;
      text-transform: uppercase;
      transition: background 0.15s;
    }

    .btn-update:hover {
      background: #60c6ff;
    }

    .status-msg {
      font-size: 0.875rem;
      color: #555;
      text-align: center;
      padding: 0.5rem;
    }

    .error-msg {
      font-size: 0.875rem;
      color: #ef4444;
      text-align: center;
      padding: 0.5rem;
    }

    /* ── INSTRUMENT PANEL ───────────────────────────── */
    .instrument-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
    }

    .gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gauge-wrap svg {
      width: 100%;
      max-width: 240px;
      height: auto;
    }

    /* ── INFO STRIP ─────────────────────────────────── */
    .info-strip {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
      width: 100%;
    }

    .info-card {
      background: #0d0d0d;
      border: 1px solid #1f1f1f;
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
    }

    .info-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.45;
    }

    /* ── RAW METAR ──────────────────────────────────── */
    .raw-metar {
      width: 100%;
      background: #080808;
      border: 1px solid #181818;
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
    }

    .raw-metar .raw-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .raw-metar .raw-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: #555;
      word-break: break-all;
      line-height: 1.5;
    }

    /* ── GAUGE LABEL (outside the circle) ──────────── */
    .gauge-label {
      text-align: center;
      font-family: 'Figtree', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      color: #777;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 400px) {
      .instrument-panel {
        gap: 0.625rem;
      }
    }
  </style>
</head>
<body>

  <!-- ── COCKPIT ────────────────────────────────────── -->
  <div id="cockpit" class="cockpit">
    <div class="cockpit-header">
      <h1 id="cockpit-id">----</h1>
      <div class="obs-time" id="cockpit-time">--:-- L</div>
    </div>

    <div class="search-bar">
      <input id="airport-input" class="search-input" type="text" maxlength="4" value="KUMP">
      <button class="btn-update" onclick="fetchMetar()">Update</button>
    </div>

    <div id="cockpit-loading" class="status-msg">Loading…</div>
    <div id="cockpit-error" class="error-msg hidden"></div>

    <div id="instruments" class="instrument-panel hidden">
      <div class="gauge-wrap">
        <svg id="gauge-fc" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Flight Category</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-temp" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Temperature</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-wind" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Wind</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-alt" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Altimeter</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-vis" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="gauge-label">Visibility</div>
      </div>
    </div>

    <div id="info-strip" class="info-strip hidden">
      <div class="info-card">
        <div class="info-label">Sky Conditions</div>
        <div class="info-value" id="sky-text">—</div>
      </div>
    </div>

    <div id="raw-metar-box" class="raw-metar hidden">
      <div class="raw-label">Raw METAR</div>
      <div class="raw-text" id="raw-metar-text">—</div>
    </div>
  </div>

  <script>
    const AIRPORT_KEY = 'metar_airport';

    const FC_COLORS = {
      VFR: '#22c55e',
      MVFR: '#3b82f6',
      IFR: '#ef4444',
      LIFR: '#d946ef',
    };

    // Lighter pastel tint of each category color for the inner circle background
    const FC_COLORS_LIGHT = {
      VFR: '#86efac',
      MVFR: '#93c5fd',
      IFR: '#fca5a5',
      LIFR: '#f0abfc',
    };

    function fcColor(category) {
      return FC_COLORS[(category || '').toUpperCase()] || '#888';
    }

    function fcColorLight(category) {
      return FC_COLORS_LIGHT[(category || '').toUpperCase()] || '#aaa';
    }

    // ── SVG helpers ────────────────────────────────────
    function svgEl(tag, attrs) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [key, value] of Object.entries(attrs || {})) {
        el.setAttribute(key, String(value));
      }
      return el;
    }

    function svgText(content, attrs) {
      const el = svgEl('text', attrs);
      el.textContent = content;
      return el;
    }

    function clearSvg(svg) {
      while (svg.firstChild) svg.removeChild(svg.firstChild);
    }

    // Draw the base gauge: black-outlined bezel + gray face
    function drawBase(svg) {
      svg.appendChild(svgEl('circle', {
        cx: 100, cy: 100, r: 96,
        stroke: '#000', 'stroke-width': 5, fill: '#2a2a2a',
      }));
      svg.appendChild(svgEl('circle', {
        cx: 100, cy: 100, r: 87,
        stroke: '#000', 'stroke-width': 2, fill: '#555',
      }));
    }

    // Draw tick marks along the inner edge of the face
    function drawTicks(svg) {
      for (let deg = 0; deg < 360; deg += 10) {
        const rad = (deg - 90) * Math.PI / 180;
        const outerRadius = 85;
        const tickLength = deg % 30 === 0 ? 10 : 5;
        svg.appendChild(svgEl('line', {
          x1: 100 + outerRadius * Math.cos(rad),
          y1: 100 + outerRadius * Math.sin(rad),
          x2: 100 + (outerRadius - tickLength) * Math.cos(rad),
          y2: 100 + (outerRadius - tickLength) * Math.sin(rad),
          stroke: '#666',
          'stroke-width': deg % 30 === 0 ? 2 : 1,
        }));
      }
    }

    // ── TEMPERATURE GAUGE ──────────────────────────────
    function renderTemp(svg, tempC) {
      clearSvg(svg);
      drawBase(svg);
      drawTicks(svg);

      const display = tempC !== null && tempC !== undefined ? `${Math.round(tempC)}°` : '--°';

      svg.appendChild(svgText(display, {
        x: 100, y: 108,
        'text-anchor': 'middle',
        fill: '#fff',
        'font-family': "'Share Tech Mono', monospace",
        'font-size': 36,
        'font-weight': 'bold',
      }));

      svg.appendChild(svgText('Celsius', {
        x: 100, y: 140,
        'text-anchor': 'middle',
        fill: '#bbb',
        'font-family': "'Figtree', sans-serif",
        'font-size': 14,
      }));
    }

    // ── WIND GAUGE ─────────────────────────────────────
    // Compass rose with a white arc on the outer bezel showing wind direction.
    function renderWind(svg, windDirection, windSpeed) {
      clearSvg(svg);
      drawBase(svg);

      const isCalm = windDirection === 0 && windSpeed === 0;

      // White arc on the outer bezel ring highlighting the wind direction.
      // The arc is drawn at r=91 (midpoint of the bezel between r=87 and r=96)
      // with stroke-width=8 so it stays within the bezel.
      if (!isCalm) {
        const arcRadius = 91;
        const circumference = 2 * Math.PI * arcRadius;
        const arcSpanDeg = 10;
        const arcLength = (arcSpanDeg / 360) * circumference;
        const gapLength = circumference - arcLength;
        // SVG strokes start at 3 o'clock. Compass 0° = top (12 o'clock).
        // Rotate so the arc is centered on windDirection.
        const rotateAngle = windDirection - arcSpanDeg / 2 - 90;
        svg.appendChild(svgEl('circle', {
          cx: 100, cy: 100, r: arcRadius,
          fill: 'none',
          stroke: 'rgba(255,255,255,0.8)',
          'stroke-width': 8,
          'stroke-dasharray': `${arcLength.toFixed(2)} ${gapLength.toFixed(2)}`,
          transform: `rotate(${rotateAngle}, 100, 100)`,
          'stroke-linecap': 'butt',
        }));
      }

      // Compass tick marks on the face edge
      for (let deg = 0; deg < 360; deg += 10) {
        const rad = (deg - 90) * Math.PI / 180;
        const outerRadius = 84;
        const tickLength = deg % 30 === 0 ? 10 : 5;
        svg.appendChild(svgEl('line', {
          x1: 100 + outerRadius * Math.cos(rad),
          y1: 100 + outerRadius * Math.sin(rad),
          x2: 100 + (outerRadius - tickLength) * Math.cos(rad),
          y2: 100 + (outerRadius - tickLength) * Math.sin(rad),
          stroke: '#666',
          'stroke-width': deg % 30 === 0 ? 2 : 1,
        }));
      }

      // Cardinal labels at radius 60 – inward enough to avoid the degree label below
      const cardinals = [
        { label: 'N', angle: 0 },
        { label: 'E', angle: 90 },
        { label: 'S', angle: 180 },
        { label: 'W', angle: 270 },
      ];
      cardinals.forEach(({ label, angle }) => {
        const rad = (angle - 90) * Math.PI / 180;
        const labelRadius = 60;
        svg.appendChild(svgText(label, {
          x: 100 + labelRadius * Math.cos(rad),
          y: 100 + labelRadius * Math.sin(rad) + 5,
          'text-anchor': 'middle',
          fill: label === 'N' ? '#f87171' : '#ccc',
          'font-family': "'Share Tech Mono', monospace",
          'font-size': 13,
          'font-weight': label === 'N' ? 'bold' : 'normal',
        }));
      });

      // Center: combined speed and direction on two lines
      if (isCalm) {
        svg.appendChild(svgEl('circle', {
          cx: 100, cy: 100, r: 8,
          stroke: '#aaa', 'stroke-width': 2, fill: 'none',
        }));
      } else {
        const speedStr = `${windSpeed}kt`;
        const dirStr = `@ ${windDirection}°`;
        svg.appendChild(svgText(speedStr, {
          x: 100, y: 97,
          'text-anchor': 'middle',
          fill: '#fff',
          'font-family': "'Share Tech Mono', monospace",
          'font-size': 36,
          'font-weight': 'bold',
        }));
        svg.appendChild(svgText(dirStr, {
          x: 100, y: 133,
          'text-anchor': 'middle',
          fill: '#bbb',
          'font-family': "'Share Tech Mono', monospace",
          'font-size': 36,
          'font-weight': 'bold',
        }));
      }
    }

    // ── ALTIMETER GAUGE ────────────────────────────────
    function renderAlt(svg, altimeter) {
      clearSvg(svg);
      drawBase(svg);
      drawTicks(svg);

      const display = altimeter || '--';

      svg.appendChild(svgText(display, {
        x: 100, y: 108,
        'text-anchor': 'middle',
        fill: '#fff',
        'font-family': "'Share Tech Mono', monospace",
        'font-size': 36,
        'font-weight': 'bold',
      }));

      svg.appendChild(svgText('inHg', {
        x: 100, y: 132,
        'text-anchor': 'middle',
        fill: '#bbb',
        'font-family': "'Figtree', sans-serif",
        'font-size': 15,
      }));
    }

    // ── FLIGHT CATEGORY GAUGE ──────────────────────────
    // Dark outer ring in the category color, light inner fill. No gray bezel.
    function renderFlightCategory(svg, category) {
      clearSvg(svg);
      const color = fcColor(category);
      const colorLight = fcColorLight(category);

      // Black background circle
      svg.appendChild(svgEl('circle', {
        cx: 100, cy: 100, r: 96,
        stroke: '#000', 'stroke-width': 3, fill: '#000',
      }));

      // Dark outer ring in the category color
      svg.appendChild(svgEl('circle', {
        cx: 100, cy: 100, r: 84,
        stroke: color, 'stroke-width': 20, fill: 'none',
      }));

      // Light inner circle
      svg.appendChild(svgEl('circle', {
        cx: 100, cy: 100, r: 72,
        stroke: '#000', 'stroke-width': 1, fill: colorLight,
      }));

      const cat = (category || '--').toUpperCase();

      svg.appendChild(svgText(cat, {
        x: 100, y: 108,
        'text-anchor': 'middle',
        fill: '#fff',
        'font-family': "'Share Tech Mono', monospace",
        'font-size': 36,
        'font-weight': 'bold',
      }));
    }

    // ── VISIBILITY GAUGE ───────────────────────────────
    function renderVis(svg, visibility) {
      clearSvg(svg);
      drawBase(svg);
      drawTicks(svg);

      const display = visibility !== undefined && visibility !== null ? String(visibility) : '--';

      svg.appendChild(svgText(display, {
        x: 100, y: 108,
        'text-anchor': 'middle',
        fill: '#fff',
        'font-family': "'Share Tech Mono', monospace",
        'font-size': 36,
        'font-weight': 'bold',
      }));

      svg.appendChild(svgText('SM', {
        x: 100, y: 132,
        'text-anchor': 'middle',
        fill: '#bbb',
        'font-family': "'Figtree', sans-serif",
        'font-size': 15,
      }));
    }

    // ── RENDER FULL COCKPIT ────────────────────────────
    function renderCockpit(data) {
      document.getElementById('cockpit-loading').classList.add('hidden');
      document.getElementById('cockpit-error').classList.add('hidden');

      document.getElementById('cockpit-id').textContent = data.id || '----';
      document.getElementById('cockpit-time').textContent = data.observation_time || '--:-- L';

      const airportInput = document.getElementById('airport-input');
      if (airportInput && data.id) airportInput.value = data.id;

      renderTemp(document.getElementById('gauge-temp'), data.temperature);
      renderWind(
        document.getElementById('gauge-wind'),
        data.wind?.direction ?? 0,
        data.wind?.speed ?? 0
      );
      renderAlt(document.getElementById('gauge-alt'), data.altimeter);
      renderFlightCategory(document.getElementById('gauge-fc'), data.flight_category);
      renderVis(document.getElementById('gauge-vis'), data.visibility);

      const skyText = data.sky_conditions?.map((s) => s.description).join('\n') || '—';
      document.getElementById('sky-text').textContent = skyText;
      document.getElementById('raw-metar-text').textContent = data.raw_text || '—';

      document.getElementById('instruments').classList.remove('hidden');
      document.getElementById('info-strip').classList.remove('hidden');
      document.getElementById('raw-metar-box').classList.remove('hidden');
    }

    // ── FETCH METAR ────────────────────────────────────
    async function fetchMetar() {
      const airportInput = document.getElementById('airport-input');
      const airport = (airportInput?.value || '').toUpperCase().trim() || 'KUMP';
      localStorage.setItem(AIRPORT_KEY, airport);

      document.getElementById('cockpit-loading').classList.remove('hidden');
      document.getElementById('cockpit-error').classList.add('hidden');
      document.getElementById('instruments').classList.add('hidden');
      document.getElementById('info-strip').classList.add('hidden');
      document.getElementById('raw-metar-box').classList.add('hidden');

      try {
        const response = await fetch(`/api/metar?id=${encodeURIComponent(airport)}`);

        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body.error || `HTTP ${response.status}`);
        }

        const data = await response.json();
        renderCockpit(data);
      } catch (error) {
        document.getElementById('cockpit-loading').classList.add('hidden');
        const errorEl = document.getElementById('cockpit-error');
        errorEl.textContent = `Error: ${error instanceof Error ? error.message : String(error)}`;
        errorEl.classList.remove('hidden');
      }
    }

    // ── INIT ───────────────────────────────────────────
    (function init() {
      const airport = localStorage.getItem(AIRPORT_KEY) || 'KUMP';
      document.getElementById('airport-input').value = airport;
      fetchMetar();
    })();
  </script>
</body>
</html>
