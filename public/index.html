<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rorpage Weather API</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/cockpit.css">
</head>
<body>

  <a href="#instruments" class="skip-link">Skip to instruments</a>

  <!-- ── COCKPIT ────────────────────────────────────── -->
  <div id="cockpit" class="cockpit">
    <div class="cockpit-header">
      <h1 id="cockpit-id" aria-label="Airport identifier: loading">----</h1>
      <div class="obs-time" id="cockpit-time">--:-- L</div>
    </div>

    <div class="search-bar">
      <label for="airport-input" class="visually-hidden">Airport ICAO code</label>
      <input id="airport-input" class="search-input" type="text" maxlength="4" value="KUMP" aria-label="Airport ICAO code">
      <button class="btn-update" onclick="fetchMetar()" aria-label="Fetch METAR">Update</button>
    </div>

    <div id="cockpit-loading" class="status-msg" aria-live="polite">Loading…</div>
    <div id="cockpit-error" class="error-msg hidden" role="alert"></div>

    <div id="instruments" class="instrument-panel hidden" tabindex="-1">
      <div class="gauge-wrap">
        <svg id="gauge-fc" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flight Category"></svg>
        <div class="gauge-label">Flight Category</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-temp" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Temperature"></svg>
        <div class="gauge-label">Temperature</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-wind" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wind"></svg>
        <div class="gauge-label">Wind</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-alt" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Altimeter"></svg>
        <div class="gauge-label">Altimeter</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-vis" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Visibility"></svg>
        <div class="gauge-label">Visibility</div>
      </div>
      <div class="gauge-wrap">
        <svg id="gauge-dew" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dewpoint"></svg>
        <div class="gauge-label">Dewpoint</div>
      </div>
    </div>

    <div id="info-strip" class="info-strip hidden">
      <div class="info-card">
        <div class="info-label">Sky Conditions</div>
        <div class="info-value" id="sky-text">—</div>
      </div>
    </div>

    <div id="raw-metar-box" class="raw-metar hidden">
      <div class="raw-label">Raw METAR</div>
      <div class="raw-text" id="raw-metar-text">—</div>
    </div>
  </div>

  <script src="/cockpit.js"></script>
</body>
</html>
